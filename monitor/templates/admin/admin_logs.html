{% extends "admin/base_site.html" %}

{% block content %}
<h1>Журнал действий администратора</h1>

<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr><th>Время</th><th>Пользователь</th><th>Действие</th></tr>
    </thead>
    <tbody>
        {% for log in logs %}
        <tr>
            <td>{{ log.timestamp|date:"d.m.Y H:i:s" }}</td>
            <td>{{ log.username }}</td>
            <td>{{ log.action }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">Нет записей</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
